apiVersion: apps/v1
kind: Deployment
metadata:
  name: hexagonal-ddd-api
  namespace: hexagonal-ddd
  labels:
    app: hexagonal-ddd-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hexagonal-ddd-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hexagonal-ddd-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: hexagonal-ddd-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: hexagonal-ddd-config
            - secretRef:
                name: hexagonal-ddd-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
