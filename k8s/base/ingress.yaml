apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hexagonal-ddd-ingress
  namespace: hexagonal-ddd
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.hexagonal-ddd.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hexagonal-ddd-api-service
                port:
                  number: 80
  tls:
    - hosts:
        - api.hexagonal-ddd.example.com
      secretName: hexagonal-ddd-tls
