apiVersion: v1
kind: Service
metadata:
  name: hexagonal-ddd-api-service
  namespace: hexagonal-ddd
  labels:
    app: hexagonal-ddd-api
spec:
  selector:
    app: hexagonal-ddd-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      name: http
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hexagonal-ddd-api-hpa
  namespace: hexagonal-ddd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hexagonal-ddd-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
