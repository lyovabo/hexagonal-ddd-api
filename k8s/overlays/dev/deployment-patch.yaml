apiVersion: apps/v1
kind: Deployment
metadata:
  name: hexagonal-ddd-api
  namespace: hexagonal-ddd
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          env:
            - name: LOG_LEVEL
              value: "debug"
            - name: NODE_ENV
              value: "development"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
